<!DOCTYPE html>
<html>
<head>
    <title>Job Listings | ResuMatch ATS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            display:flex;
            background:#f4f7fc;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#667eea;
            color:white;
            padding:30px;
            position:fixed;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:white;
            color:#667eea;
        }

        .main{
            margin-left:250px;
            width:100%;
            padding:40px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .add{
            background:#667eea;
            color:white;
        }

        .card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
            gap:20px;
        }

        .job-card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .job-card:hover{
            transform:translateY(-5px);
        }

        .job-card h3{
            color:#667eea;
        }

        .tags{
            margin:10px 0;
        }

        .tag{
            display:inline-block;
            padding:5px 10px;
            background:#f0f0f0;
            border-radius:8px;
            margin-right:5px;
            font-size:12px;
        }

        .actions{
            margin-top:15px;
            display:flex;
            gap:10px;
        }

        .edit{background:#ff9800;color:white;}
        .delete{background:#ff5252;color:white;}
        .view{background:#00c853;color:white;}
    </style>
</head>

<body>

<div class="sidebar">
    <h2>ResuMatch ATS</h2>
    <a href="/recruiter">🏠 Dashboard</a>
    <a href="/post_jobs">➕ Post Job</a>
    <a href="/candidates">🧑‍💻 Candidates</a>
    <a href="/jobs">💼 Job Listings</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

    <div class="header">
        <h1>Job Listings 💼</h1>

        <a href="/post_jobs">
            <button class="btn add">➕ Add Job</button>
        </a>
    </div>

    <div class="card-grid">

        {% for job in jobs %}

        <div class="job-card">

            <h3>{{ job.title }}</h3>
            <p>{{ job.company }}</p>

            <div class="tags">
                <span class="tag">{{ job.location }}</span>
                <span class="tag">{{ job.type }}</span>
                <span class="tag">₹{{ job.salary }}</span>
            </div>

            <p style="font-size:13px;color:#555;">
                {{ job.description[:100] }}...
            </p>

            <div class="actions">

                <button class="btn view">View</button>
                <button class="btn edit">Edit</button>
                <button class="btn delete" onclick="confirmDelete()">Delete</button>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script>
function confirmDelete(){
    if(confirm("Are you sure you want to delete this job?")){
        alert("Job deleted successfully!");
    }
}
</script>

</body>
</html>
