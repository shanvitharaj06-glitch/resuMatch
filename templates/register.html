<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#333;
}

input,select{
    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2196f3;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<select name="role">

<option value="candidate">
Candidate
</option>

<option value="recruiter">
Recruiter
</option>

</select>

<button>
Register
</button>

</form>

</div>

</body>
</html>
