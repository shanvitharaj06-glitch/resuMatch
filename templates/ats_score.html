<!DOCTYPE html>
<html>
<head>
    <title>ATS Score | ResuMatch</title>

    <style>

        body{
            font-family:Segoe UI;
            background:#f4f7fc;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#667eea;
            margin-bottom:30px;
        }

        .score-circle{
            width:180px;
            height:180px;
            border-radius:50%;
            margin:20px auto;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:40px;
            font-weight:bold;
            color:white;
        }

        .bar-container{
            width:100%;
            background:#e0e0e0;
            border-radius:20px;
            overflow:hidden;
            margin-top:30px;
        }

        .bar{
            height:25px;
            width:0%;
            color:white;
            font-weight:bold;
            line-height:25px;
            transition:1s ease-in-out;
        }

        .info{
            margin-top:30px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .card{
            background:#f9f9ff;
            padding:20px;
            border-radius:15px;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 25px;
            background:#667eea;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>📊 ATS Score Report</h1>

   {% set score = ats|default(0) %}

    <!-- CIRCLE SCORE -->
    <div class="score-circle" style="background: {{ color }};">
    {{ score }}%
</div>

    <p>Resume Match Score</p>

    <!-- BAR -->
    <div class="bar"
     style="width: {{ score }}%; background: {{ gradient }};">
    {{ score }}%
</div>

    <!-- INFO -->
    <div class="info">

        <div class="card">
            <h3>📄 Resume Quality</h3>
            <p>Structured and readable</p>
        </div>

        <div class="card">
            <h3>🔑 Keywords</h3>
            <p>Matched with job description</p>
        </div>

        <div class="card">
            <h3>💼 Job Fit</h3>
            <p>Relevant to your skills</p>
        </div>

    </div>

    <a href="/candidate" class="btn">🏠 Back to Dashboard</a>

</div>

</body>
</html>
