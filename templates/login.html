<!DOCTYPE html>
<html>
<head>
    <title>ResuMatch Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            width:900px;
            height:550px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
        }

        .left{
            width:50%;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
        }

        .left h1{
            font-size:45px;
            margin-bottom:20px;
        }

        .left p{
            font-size:18px;
            line-height:30px;
        }

        .right{
            width:50%;
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right h2{
            text-align:center;
            margin-bottom:30px;
            color:#333;
            font-size:32px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:1px solid #ccc;
            border-radius:12px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#667eea;
            box-shadow:0 0 10px rgba(102,126,234,0.4);
        }

        .btn{
            width:100%;
            padding:15px;
            background:#667eea;
            border:none;
            color:white;
            font-size:18px;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#4f5bd5;
            transform:scale(1.03);
        }

        .bottom{
            text-align:center;
            margin-top:20px;
        }

        .bottom a{
            color:#667eea;
            text-decoration:none;
            font-weight:bold;
        }

        .bottom a:hover{
            text-decoration:underline;
        }

        .icon{
            font-size:80px;
            margin-bottom:20px;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="left">
        <div class="icon">📄</div>
        <h1>ResuMatch ATS</h1>

        <p>
            AI-powered Applicant Tracking System that
            analyzes resumes, extracts skills, and
            matches candidates with the perfect job opportunities.
        </p>
    </div>

    <div class="right">

        <h2>Login</h2>

        <form action="/login" method="POST">

            <div class="input-box">
                <input type="email"
                       name="email"
                       placeholder="Enter Email"
                       required>
            </div>

            <div class="input-box">
                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>
            </div>

            <button class="btn" type="submit">
                Login
            </button>

        </form>

        <div class="bottom">
            Don't have an account?
            <a href="/register">Register Here</a>
        </div>

    </div>

</div>

</body>
</html>
